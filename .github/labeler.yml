# Configuration for actions/labeler
# Maps file paths to PR labels

api:
  - changed-files:
      - any-glob-to-any-file: "src/app/api/**"

ui:
  - changed-files:
      - any-glob-to-any-file:
          - "src/components/**"
          - "src/app/**/page.tsx"

database:
  - changed-files:
      - any-glob-to-any-file: "supabase/**"

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - "*.md"
          - "docs/**"

ci:
  - changed-files:
      - any-glob-to-any-file: ".github/**"

dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - "package.json"
          - "package-lock.json"

config:
  - changed-files:
      - any-glob-to-any-file:
          - "eslint.config.mjs"
          - "next.config.ts"
          - "tsconfig.json"
          - "postcss.config.mjs"
          - "vercel.json"
